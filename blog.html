<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog | Tung Tran</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">Tung Tran.</a>
      <ul class="nav-links" style="display: flex; align-items: center;">
        <li><a href="index.html" data-i18n="nav_resume">Resume</a></li>
        <li><a href="blog.html" class="active" data-i18n="nav_blog">Blog</a></li>
        <li class="lang-toggle">
          <button id="btn-en" class="lang-btn">EN</button>
          <button id="btn-vi" class="lang-btn">VI</button>
        </li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="hero" style="margin-bottom: 2rem;">
      <h1 data-i18n="blog_hero_title">Writing</h1>
      <p data-i18n="blog_hero_desc">Thoughts on AI, Software Engineering, and Continual Learning.</p>
    </section>

    <section>
      <div class="grid" id="blog-list" style="display: flex; flex-direction: column; gap: 1rem;">
        <!-- Blog posts will be loaded here via blog.js -->
        <p style="color: var(--text-secondary);" data-i18n="loading_posts">Loading posts...</p>
      </div>
    </section>
  </main>

  <footer>
    <p data-i18n="footer_text">&copy; 2025 Tung Tran. Built with pure HTML/CSS/JS.</p>
  </footer>

  <script src="i18n.js?v=3"></script>
  <script src="blog.js?v=3"></script>
</body>
</html>
